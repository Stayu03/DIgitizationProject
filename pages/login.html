<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #DE5C8E;
      --gray: #58595B;
      --white: #FFFFFF;
      --bg: #F8E1EA;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #fff6fa 0%, var(--bg) 45%, #efedf2 100%);
      font-family: "Kanit", sans-serif;
      color: var(--gray);
    }

    .wrap {
      width: 100%;
      max-width: 460px;
      text-align: center;
      padding: 20px 18px 28px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.55);
      box-shadow: 0 16px 40px rgba(88, 89, 91, 0.12);
    }

    .headline {
      color: var(--pink);
      line-height: 1.2;
      margin: 0;
      font-weight: 500;
    }

    .headline .line1 {
      display: block;
      font-size: 30pt;
    }

    .headline .line2 {
      display: block;
      font-size: 20pt;
    }

    .subhead {
      margin: 30px 0 18px;
      font-size: 20pt;
      color: var(--gray);
      font-weight: 400;
    }

    .login-box {
      background: var(--gray);
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      box-shadow: 0 14px 32px rgba(88, 89, 91, 0.22);
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14pt;
      color: var(--white);
      margin-bottom: 8px;
      font-weight: 300;
    }

    input {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 8px;
      background: var(--white);
      color: var(--gray);
      font-size: 14pt;
      font-family: "Kanit", sans-serif;
      padding: 10px 14px;
      outline: none;
    }

    input:focus {
      box-shadow: 0 0 0 3px rgba(222, 92, 142, 0.25);
    }

    .error {
      margin: 0 0 14px;
      color: #ffd7e5;
      font-size: 12pt;
      text-align: center;
    }

    .submit-btn {
      margin-top: 16px;
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 9px;
      background: var(--pink);
      color: var(--white);
      font-size: 14pt;
      font-family: "Kanit", sans-serif;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .submit-btn:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      .headline .line1 {
        font-size: 24pt;
      }

      .headline .line2,
      .subhead {
        font-size: 16pt;
      }

      .login-box {
        padding: 16px;
      }

      label,
      input,
      .submit-btn {
        font-size: 12pt;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="headline">
      <span class="line1">Digitization System</span>
      <span class="line2">for Chula Library</span>
    </h1>

    <h2 class="subhead">เข้าสู่ระบบ</h2>

    <form method="post" action="{{ url_for('login') }}">
      <div class="login-box">
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <div class="field">
          <label for="email">อีเมล</label>
          <input id="email" type="email" name="email" required>
        </div>

        <div class="field">
          <label for="password">รหัสผ่าน</label>
          <input id="password" type="password" name="password" required>
        </div>
      </div>

      <button class="submit-btn" type="submit">ยืนยันการเข้าสู่ระบบ</button>
    </form>
  </main>
</body>
</html>
