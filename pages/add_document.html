{% extends "base.html" %}

{% block title %}Add Document{% endblock %}

{% block content %}
<section class="card">
  <h1 class="page-title">Add Document</h1>

  {% if error %}
  <p style="color: #b00020;">{{ error }}</p>
  {% endif %}

  <form method="post" action="{{ url_for('add_document_page') }}">
    <div class="grid-2">
      <div class="stack">
        <label for="file_name">File Name</label>
        <input id="file_name" name="file_name" required>
      </div>
      <div class="stack">
        <label for="user_name">User Name</label>
        <select id="user_name" name="user_name" required>
          {% for u in users %}
          <option value="{{ u.user_name }}">{{ u.user_name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="grid-2" style="margin-top: 12px;">
      <div class="stack">
        <label for="bib">BIB</label>
        <input id="bib" name="bib">
      </div>
      <div class="stack">
        <label for="call_number">Call Number</label>
        <input id="call_number" name="call_number">
      </div>
    </div>

    <div class="grid-2" style="margin-top: 12px;">
      <div class="stack">
        <label for="collection">Collection</label>
        <select id="collection" name="collection">
          <option value="">-- Select Collection --</option>
          {% for option in collection_options %}
          <option value="{{ option }}">{{ option }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="stack">
        <label for="title">Title</label>
        <input id="title" name="title">
      </div>
    </div>

    <div class="grid-2" style="margin-top: 12px;">
      <div class="stack">
        <label for="publish_date">Publish Date</label>
        <input id="publish_date" name="publish_date" type="number">
      </div>
      <div class="stack">
        <label for="file_path">File Path</label>
        <input id="file_path" name="file_path">
      </div>
    </div>

    <p style="margin-top: 16px;">
      <button class="btn" type="submit">Save Document</button>
    </p>
  </form>
</section>
{% endblock %}
